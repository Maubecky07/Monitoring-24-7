<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wartungsarbeiten | iRacing Kalender</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #0b0b0b;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        .maintenance-container {
            padding: 40px;
            border: 1px solid #ff7b00;
            background: #111;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(255, 123, 0, 0.2);
            max-width: 500px;
            width: 90%;
        }

        .icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: inline-block;
            animation: wrench 2.5s infinite ease-in-out;
        }

        @keyframes wrench {
            0% { transform: rotate(0deg); }
            20% { transform: rotate(-15deg); }
            40% { transform: rotate(15deg); }
            60% { transform: rotate(-15deg); }
            100% { transform: rotate(0deg); }
        }

        h1 {
            color: #ff7b00;
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px #ff7b00;
            margin-bottom: 10px;
        }

        p {
            color: #ddd;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .status-badge {
            display: inline-block;
            background: #dc3545;
            color: white;
            padding: 8px 20px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(220, 53, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #555;
        }

        .race-line {
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, #ff7b00, transparent);
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="maintenance-container">
    <div class="icon">🔧</div>
    <h1>Boxenstopp</h1>
    <div class="status-badge">Wartungsarbeiten aktiv</div>
    
    <p>
        Wir schrauben gerade am Setup des Kalenders.<br>
        In Kürze sind wir wieder auf der Strecke für euch da!
    </p>

    <div class="race-line"></div>

    <div class="footer">
        🏁 iRacing Kalender Maintenance Mode
    </div>
</div>

</body>
</html>
